<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monotile — the shape that never repeats</title>
    <meta
      name="description"
      content="Pan an infinite, never-repeating tiling made from a single 2023 einstein hat/spectre tile, then export it as poster art."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <span class="wordmark">Monotile<span class="wordmark-dot">.</span></span>
        <div class="toolbar-right">
          <span class="readout" id="zoom-readout" role="status">zoom 1.00&times;</span>
          <button type="button" class="icon-btn" id="mute-toggle" aria-pressed="false">
            Sound: On
          </button>
        </div>
      </header>
      <div class="canvas-wrap">
        <canvas
          id="tiling-canvas"
          tabindex="0"
          aria-label="Infinite monotile pattern. Drag or pinch to pan and zoom, or use the arrow keys, +/-, and Home once focused."
        ></canvas>
        <div class="scheme-panel" id="scheme-panel" role="group" aria-label="Coloring scheme">
          <button
            type="button"
            class="sheet-handle"
            id="sheet-handle"
            aria-expanded="false"
            aria-controls="scheme-panel-body"
          >
            <span class="sheet-handle-bar" aria-hidden="true"></span>
            Controls
          </button>
          <div class="scheme-panel-body" id="scheme-panel-body">
            <button type="button" class="scheme-btn" data-scheme="" aria-pressed="true">Line</button>
            <button type="button" class="scheme-btn" data-scheme="supertile" aria-pressed="false">
              Supertile
            </button>
            <button type="button" class="scheme-btn" data-scheme="generation" aria-pressed="false">
              Generation
            </button>
            <button type="button" class="scheme-btn" data-scheme="orientation" aria-pressed="false">
              Orientation
            </button>
            <button type="button" class="scheme-btn export-btn" id="export-btn">Export SVG</button>
          </div>
        </div>
        <div class="crosshair" id="crosshair" aria-hidden="true"></div>
        <div class="survey-readout" id="survey-readout" aria-hidden="true"></div>
        <div class="inspector-panel" id="inspector-panel" role="group" aria-label="Tile inspector" hidden>
          <button type="button" class="inspector-close" id="inspector-close" aria-label="Close tile inspector">
            &times;
          </button>
          <dl>
            <dt>Type</dt>
            <dd id="inspector-type"></dd>
            <dt>Generation</dt>
            <dd id="inspector-generation"></dd>
            <dt>Orientation</dt>
            <dd id="inspector-orientation"></dd>
            <dt>Lineage</dt>
            <dd id="inspector-lineage"></dd>
          </dl>
        </div>
      </div>
      <div class="flash" id="export-flash" aria-hidden="true"></div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
